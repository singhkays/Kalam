name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Cache SwiftPM & DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
            ~/.swiftpm
          key: macos-xcode-16.0-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            macos-xcode-16.0-spm-

      - name: Build & Package
        env:
          CI: true
          # Leave SIGNING_IDENTITY empty for ad-hoc signing (built-in runner default)
          SIGNING_IDENTITY: ""
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Generate checksum and release notes
        run: |
          shasum -a 256 build/Kalam.dmg > build/Kalam.dmg.sha256
          RELEASE_DATE="$(date -u +'%Y-%m-%d')"
          cat > build/release-notes.md <<EOF
          Kalam ${{ github.ref_name }}

          Released: ${RELEASE_DATE}

          ## Download

          - Kalam.dmg
          - SHA-256: see \`Kalam.dmg.sha256\`

          To verify:

          \`\`\`bash
          shasum -a 256 Kalam.dmg
          \`\`\`

          ## Changes

          - Add release highlights here.
          - Add fixes here.
          - Add known user-facing notes here.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/Kalam.dmg
            build/Kalam.dmg.sha256
          body_path: build/release-notes.md
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
