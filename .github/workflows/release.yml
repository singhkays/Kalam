name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Build & Package
        env:
          CI: true
          # Leave SIGNING_IDENTITY empty for ad-hoc signing (built-in runner default)
          SIGNING_IDENTITY: ""
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/Kalam.dmg
          body: |
            Kalam macOS Release. 
            
            > [!WARNING]
            > **Unsigned Release**: Since this binary is not signed with an Apple Developer certificate, you will need to right-click the app and choose "Open" the first time you run it, or allow it in System Settings > Privacy & Security.
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
